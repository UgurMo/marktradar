// Detecteer marktregime: trending of zijwaarts
function detectRegime(closes){
  if(closes.length<50)return"unknown";
  const recent=closes.slice(-50);
  const e20=calcEMA(recent,20);
  const e50=calcEMA(recent,50);
  // Bereken absolute richting over 50 candles
  const trend=Math.abs(recent[recent.length-1]-recent[0])/recent[0];
  // Bereken volatiliteit (standaarddeviatie)
  const avg=recent.reduce((a,b)=>a+b,0)/recent.length;
  const std=Math.sqrt(recent.reduce((a,b)=>a+(b-avg)**2,0)/recent.length)/avg;
  // Trending: sterke richting, EMA's divergeren
  const emaDiff=Math.abs(e20-e50)/e50;
  return(trend>0.04||emaDiff>0.015)?"trending":"sideways";
}

// Evalueer één indicator op historische data
function evalIndicator(name,closes,times,horizonH=4){
  let correct=0,total=0;
  const minI=Math.max(26,50); // genoeg history
  for(let i=minI;i<closes.length-horizonH;i++){
    const slice=closes.slice(0,i+1);
    const price=closes[i];
    const futurePrice=closes[i+horizonH];
    const ch=(closes[i]-closes[i-1])/closes[i-1]*100;
    // Bereken deze indicator
    let signal=0; // +1=bullish, -1=bearish, 0=neutraal
    if(name==="rsi"){
      const rsi=calcRSI(slice,14);
      if(rsi<32)signal=1;else if(rsi>68)signal=-1;
    }else if(name==="macd"){
      if(slice.length>=26)signal=calcEMA(slice.slice(-12),12)>calcEMA(slice.slice(-26),26)?1:-1;
    }else if(name==="bb"){
      const bb=calcBollinger(slice);
      if(bb.lower>0&&price<=bb.lower*1.01)signal=1;
      else if(bb.upper>0&&price>=bb.upper*0.99)signal=-1;
    }else if(name==="alligator"){
      const al=calcAlligator(slice);
      if(al.lips>al.teeth&&al.teeth>al.jaw)signal=1;
      else if(al.lips<al.teeth&&al.teeth<al.jaw)signal=-1;
    }else if(name==="ema"){
      const e20=calcEMA(slice.slice(-20),20);
      const e50=calcEMA(slice.slice(-50),50);
      signal=e20>e50?1:-1;
    }else if(name==="fib"){
      const fib=calcFibonacci(slice);
      if(fib&&price>=fib.fib650&&price<=fib.fib618)signal=1;
      else if(fib&&price>=fib.high*0.97)signal=-1;
    }else if(name==="trend24"){
      signal=ch>3?1:ch<-3?-1:0;
    }
    if(signal===0)continue; // neutraal — niet evalueren
    total++;
    const wasCorrect=(signal===1&&futurePrice>price)||(signal===-1&&futurePrice<price);
    if(wasCorrect)correct++;
  }
  return total>0?correct/total:0.5; // 0.5 = onbekend
}

// Hoofdfunctie: leer gewichten uit 720 uur data
async function runLearning(closes,times){
  const indicators=["rsi","macd","bb","alligator","ema","fib","trend24"];
  const regime=detectRegime(closes);
  const scores={};
  for(const ind of indicators){
    scores[ind]=evalIndicator(ind,closes,times,4);
  }
  // Schaal scores naar gewichten (0.5× tot 3×)
  // Basisgewichten
  const base={rsi:2,macd:1,bb:1,alligator:1,ema:2,fib:3,trend24:1};
  const weights={};
  for(const ind of indicators){
    const score=scores[ind]; // 0.0 - 1.0
    // Score 0.5 = neutraal → basisgewicht
    // Score 0.7+ → gewicht omhoog, score 0.3- → omlaag
    const factor=0.5+score*2.5; // 0.5 bij 0% correct, 3.0 bij 100% correct
    weights[ind]=Math.round(base[ind]*factor*10)/10;
  }
  return{weights,scores,regime,learnedAt:Date.now(),candles:closes.length};
}

// Haal 720 uur ETH-EUR candles op
async function fetch720Candles(){
  let candles=null;
  // Via Worker
  try{
    const keys=loadBitvavoKeys();
    if(keys.workerUrl){
      const base=keys.workerUrl.replace(/\/bitvavo$/,"");
      const r=await fetch(base+"/bitvavo/market/eth720h",{signal:AbortSignal.timeout(15000)});
      if(r.ok){const d=await r.json();if(Array.isArray(d))candles=d;}
    }
  }catch(_){}
  // Binance direct
  if(!candles)try{
    const r=await fetch("https://api.binance.com/api/v3/klines?symbol=ETHEUR&interval=1h&limit=720",{signal:AbortSignal.timeout(15000)});
    if(r.ok)candles=await r.json();
  }catch(_){}
  // allorigins fallback
  if(!candles)try{
    const u=encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=ETHEUR&interval=1h&limit=720");
    const r=await fetch(`https://api.allorigins.win/get?url=${u}`,{signal:AbortSignal.timeout(20000)});
    const d=await r.json();candles=JSON.parse(d.contents);
  }catch(_){}
  return candles;
}

// Start leermodule — wordt aangeroepen bij laden en elke 24 uur
async function initLearning(){
  // Laad opgeslagen gewichten als ze minder dan 24 uur oud zijn
  const saved=loadWeights();
  if(saved&&saved.learnedAt&&(Date.now()-saved.learnedAt)<24*3600*1000){
    state.weights=saved.weights;
    state.regime=saved.regime;
    state.learnedAt=saved.learnedAt;
    console.log("Gewichten geladen uit cache:",state.regime);
    return;
  }
  // Anders: haal data op en leer
  console.log("Leermodule gestart — 720 uur data ophalen...");
  const candles=await fetch720Candles();
  if(!candles||!candles.length){console.warn("Geen data voor leermodule");return;}
  const closes=candles.map(c=>parseFloat(c[4]));
  const times=candles.map(c=>c[0]);
  const result=await runLearning(closes,times);
  state.weights=result.weights;
  state.regime=result.regime;
  state.learnedAt=result.learnedAt;
  saveWeights(result);
  console.log("Leermodule klaar:",result.regime,result.weights);
}

// Evalueer oude signalen (4 en 8 uur na signaal)
function evaluateSignalLog(currentPrice){
  const log=loadSignalLog();
  let changed=false;
  const now=Date.now();
  log.forEach(s=>{
    const ageH=(now-s.time)/3600000;
    if(ageH>=4&&s.eval4h===null){
      const correct=(s.advice==="INSTAP"&&currentPrice>s.price)||(s.advice==="UITSTAP"&&currentPrice<s.price);
      s.eval4h=correct;changed=true;
    }
    if(ageH>=8&&s.eval8h===null){
      const pctMove=Math.abs((currentPrice-s.price)/s.price)*100;
      s.eval8h={correct:(s.advice==="INSTAP"&&currentPrice>s.price)||(s.advice==="UITSTAP"&&currentPrice<s.price),pctMove};
      changed=true;
    }
  });
  if(changed){saveSignalLog(log);state.signalLog=log;}
  return log;
}

// Bereken betrouwbaarheid als percentage
function calcConfidence(buy,sell,weights){
  const w=weights||{rsi:2,macd:1,bb:1,alligator:1,ema:2,fib:3,trend24:1};
  const tot=buy+sell;
  if(tot===0)return 50;
  const dom=Math.abs(buy-sell)/tot;
  // Schaal 0.5-1.0 dominantie → 50-95% betrouwbaarheid
  const base=50+dom*45;
  return Math.min(95,Math.round(base));
}

const WORKER_URL="https://bitvavo.JOUWACCOUNT.workers.dev/bitvavo";

async function bitvavoFetch(path,method="GET"){
  const keys=loadBitvavoKeys();
  if(!keys.workerUrl){return{error:"Worker URL niet ingesteld"};}
  try{
    const res=await fetch(keys.workerUrl+path,{
      method:"GET",
      signal:AbortSignal.timeout(8000)
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({error:res.statusText}));
      throw new Error(e.error||res.statusText);
    }
    return await res.json();
  }catch(e){
    console.warn("Bitvavo Worker fout:",e.message);
    return{error:e.message};
  }
}

async function fetchBitvavoEthEurPrice(){
  // Haal ETH-EUR prijs direct van Bitvavo — nauwkeuriger dan USD omrekening
  try{
    const data=await bitvavoFetch("/ticker/price?market=ETH-EUR");
    if(data&&!data.error&&data.price){
      const price=parseFloat(data.price);
      if(price>0){
        state.ethEurPrice=price;
        // Update ook eurUsd zodat conversies kloppen
        if(state.eth?.price){
          state.eurUsd=state.eth.price/price;
        }
        return price;
      }
    }
  }catch(_){}
  return null;
}

async function fetchBitvavoBalance(){
  const data=await bitvavoFetch("/balance");
  if(!data||data.error)return null;
  // Zoek ETH en EUR balances
  const eth=data.find(b=>b.symbol==="ETH");
  const eur=data.find(b=>b.symbol==="EUR");
  return{
    eth:parseFloat(eth?.available||0)+parseFloat(eth?.inOrder||0),
    ethAvailable:parseFloat(eth?.available||0),
    eur:parseFloat(eur?.available||0)+parseFloat(eur?.inOrder||0),
    eurAvailable:parseFloat(eur?.available||0),
  };
}

async function fetchBitvavoTrades(){
  const data=await bitvavoFetch("/ETH-EUR/trades?limit=20");
  if(!data||data.error)return null;
  return data.map(t=>({
    type:t.side==="buy"?"buy":"sell",
    price:parseFloat(t.price),
    priceUsd:parseFloat(t.price)*(state.eurUsd||1.09),
    eth:parseFloat(t.amount),
    eur:parseFloat(t.price)*parseFloat(t.amount),
    fee:parseFloat(t.feePaid||0),
    pct:100,
    time:t.timestamp,
    bitvavoId:t.id,
  }));
}

async function syncBitvavo(){
  const keys=loadBitvavoKeys();
  if(!keys.workerUrl){state.bitvavoStatus="no_key";return;}
  state.bitvavoStatus="syncing";
  // Haal ETH-EUR prijs op (nauwkeuriger dan USD omrekening)
  await fetchBitvavoEthEurPrice();
  // Haal saldo op
  const bal=await fetchBitvavoBalance();
  if(bal?.error||!bal){state.bitvavoStatus="error";return;}
  // Haal trades op
  const trades=await fetchBitvavoTrades();
  // startValue is altijd de initiële inleg — nooit berekend uit trades
  const startValue=200.18;
  const newPf={
    eur:bal.eur,
    eth:bal.eth,
    startValue,
    trades:trades||state.portfolio.trades,
    bitvavoSynced:new Date().toISOString(),
  };
  state.portfolio=newPf;
  savePf(newPf);
  state.bitvavoStatus="synced";
  state.bitvavoLastSync=new Date();
  if(state.tab==="crypto")renderContent();
  updateBanner();
}

// ─── Signalen ─────────────────────────────────────────────────────────────────
function calcRSI(cl,p=14){
  if(cl.length<p+1)return 50;
  let g=0,l=0;
  for(let i=cl.length-p;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l-=d;}
  const ag=g/p,al=l/p;if(al===0)return 100;return 100-(100/(1+ag/al));
}
function calcEMA(cl,p){
  if(!cl||cl.length<p)return cl[cl.length-1]||0;
  const k=2/(p+1);let e=cl[0];for(let i=1;i<cl.length;i++)e=cl[i]*k+e*(1-k);return e;
}
// ─── SMA berekening ──────────────────────────────────────────────────────────
function calcSMA(cl,p){
  if(cl.length<p)return cl[cl.length-1]||0;
  return cl.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// ─── Bollinger Bands ─────────────────────────────────────────────────────────
function calcBollinger(cl,p=20,mult=2){
  if(cl.length<p)return{upper:0,lower:0,mid:0};
  const slice=cl.slice(-p);
  const mid=slice.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mid)**2,0)/p);
  return{upper:mid+mult*std,lower:mid-mult*std,mid};
}

// ─── Williams Alligator ──────────────────────────────────────────────────────
function calcAlligator(cl){
  // Jaw=13 SMMA shifted 8, Teeth=8 SMMA shifted 5, Lips=5 SMMA shifted 3
  function smma(arr,p){
    if(arr.length<p)return arr[arr.length-1]||0;
    let s=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
    for(let i=p;i<arr.length;i++)s=(s*(p-1)+arr[i])/p;
    return s;
  }
  return{
    jaw:smma(cl,13),
    teeth:smma(cl,8),
    lips:smma(cl,5),
  };
}

// ─── Fibonacci niveaus berekenen ─────────────────────────────────────────────
function calcFibonacci(closes){
  if(closes.length<20)return null;
  const recent=closes.slice(-50);
  const high=Math.max(...recent);
  const low=Math.min(...recent);
  const range=high-low;
  return{
    high,low,range,
    fib236:high-0.236*range,
    fib382:high-0.382*range,
    fib500:high-0.500*range,
    fib618:high-0.618*range, // Golden Pocket start
    fib650:high-0.650*range, // Golden Pocket eind
    fib786:high-0.786*range,
    ext127:high+0.272*range, // Take profit 1
    ext162:high+0.618*range, // Take profit 2
  };
}

// ─── Hoofdsignaal functie ────────────────────────────────────────────────────
function buildSignals(price,ch24,closes,portfolio){
  const rsi=calcRSI(closes,14);
  const e20=closes.length>=20?calcEMA(closes.slice(-20),20):price;
  const e50=closes.length>=50?calcEMA(closes.slice(-50),50):price;
  const e200=closes.length>=200?calcEMA(closes.slice(-200),200):closes.length>=50?calcEMA(closes,50):price;
  const macdBull=closes.length>=26?calcEMA(closes.slice(-12),12)>calcEMA(closes.slice(-26),26):ch24>0;
  const bb=calcBollinger(closes);
  const alligator=calcAlligator(closes);
  const fib=calcFibonacci(closes);

  // Alligator: lippen boven tanden boven kaak = opwaarts
  const alligatorBull=alligator.lips>alligator.teeth&&alligator.teeth>alligator.jaw;
  const alligatorBear=alligator.lips<alligator.teeth&&alligator.teeth<alligator.jaw;

  // Fibonacci Golden Pocket check
  const inGoldenPocket=fib&&price>=fib.fib650&&price<=fib.fib618;
  const nearResistance=fib&&price>=fib.high*0.97; // binnen 3% van vorige high

  // Bollinger checks
  const nearLowerBB=bb.lower>0&&price<=bb.lower*1.01;
  const nearUpperBB=bb.upper>0&&price>=bb.upper*0.99;

  // 200 SMA trend filter
  const aboveTrend=price>e200;

  // Portefeuille context: hoeveel % gestegen/gedaald sinds aankoop
  let portfolioContext=null;
  if(portfolio&&portfolio.eth>0&&portfolio.trades.length>0){
    const lastBuy=portfolio.trades.filter(t=>t.type==="buy").slice(-1)[0];
    if(lastBuy){
      // Vergelijk in USD als aankoopprijs in USD was (oude trades), anders EUR
      const buyPriceUsd=lastBuy.priceUsd||lastBuy.price;
      const pctChange=((price-buyPriceUsd)/buyPriceUsd)*100;
      portfolioContext={buyPrice:lastBuy.price,buyPriceUsd,pctChange,isDown10:pctChange<=-10};
    }
  }

  // Gebruik geleerde gewichten indien beschikbaar
  const W=state.weights||{rsi:2,macd:1,bb:1,alligator:1,ema:2,fib:3,trend24:1};
  let buy=0,sell=0,reasons=[];

  // ── RSI (geleerd gewicht) ─────────────────────────────────────────────────
  if(rsi<32){buy+=W.rsi;reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"buy",w:"Oververkocht (<32) — instapzone"});}
  else if(rsi>68){sell+=W.rsi;reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"sell",w:"Overkocht (>68) — uitstapzone"});}
  else{reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"hold",w:"Neutraal (32–68)"});}

  // ── Fibonacci Golden Pocket (geleerd gewicht) ─────────────────────────────
  if(inGoldenPocket){
    buy+=W.fib;
    reasons.push({l:"Fibonacci",v:"Golden Pocket",verd:"buy",w:`Prijs in 61.8–65% zone — sterk instapniveau`});
  } else if(nearResistance){
    sell+=W.fib;
    reasons.push({l:"Fibonacci",v:"Weerstand",verd:"sell",w:`Prijs dicht bij vorige top — uitstapzone`});
  } else if(fib){
    const pct=((price-fib.low)/(fib.high-fib.low)*100).toFixed(0);
    reasons.push({l:"Fibonacci",v:`${pct}% herstel`,verd:"hold",w:`Prijs op ${pct}% van de recente range`});
  }

  // ── EMA trend (geleerd gewicht) ───────────────────────────────────────────
  if(aboveTrend){buy+=W.ema;reasons.push({l:"EMA Trend",v:"↗ Boven",verd:"buy",w:"Prijs boven 200 EMA — opwaartse trend"});}
  else{sell+=W.ema;reasons.push({l:"EMA Trend",v:"↘ Onder",verd:"sell",w:"Prijs onder 200 EMA — neerwaartse trend"});}

  // ── Williams Alligator (geleerd gewicht) ──────────────────────────────────
  if(alligatorBull){buy+=W.alligator;reasons.push({l:"Alligator",v:"Eet ↑",verd:"buy",w:"Trend omhoog"});}
  else if(alligatorBear){sell+=W.alligator;reasons.push({l:"Alligator",v:"Eet ↓",verd:"sell",w:"Trend omlaag"});}
  else{reasons.push({l:"Alligator",v:"Slaapt",verd:"hold",w:"Zijwaartse markt"});}

  // ── MACD (geleerd gewicht) ────────────────────────────────────────────────
  if(macdBull){buy+=W.macd;reasons.push({l:"MACD",v:"Bullish",verd:"buy",w:"Momentum omhoog"});}
  else{sell+=W.macd;reasons.push({l:"MACD",v:"Bearish",verd:"sell",w:"Momentum omlaag"});}

  // ── Bollinger Bands (geleerd gewicht) ─────────────────────────────────────
  if(nearLowerBB){buy+=W.bb;reasons.push({l:"Bollinger",v:"Onder band",verd:"buy",w:"Oversold — potentieel instapmoment"});}
  else if(nearUpperBB){sell+=W.bb;reasons.push({l:"Bollinger",v:"Boven band",verd:"sell",w:"Overbought — potentieel uitstapmoment"});}
  else{reasons.push({l:"Bollinger",v:"In band",verd:"hold",w:"Neutrale zone"});}

  // ── 24H trend (geleerd gewicht) ───────────────────────────────────────────
  if(ch24>3){buy+=W.trend24;reasons.push({l:"24H trend",v:`+${ch24.toFixed(1)}%`,verd:"buy",w:"Sterke stijging"});}
  else if(ch24<-3){sell+=W.trend24;reasons.push({l:"24H trend",v:`${ch24.toFixed(1)}%`,verd:"sell",w:"Sterke daling"});}
  else{reasons.push({l:"24H trend",v:`${ch24.toFixed(1)}%`,verd:"hold",w:"Beperkte beweging"});}

  // ── OVERRIDE: in positie en -10% ─────────────────────────────────────────
  if(portfolioContext?.isDown10){
    return{rsi,e20,e50,e200,macdBull,bb,fib,alligator,advice:"HOUD",strength:"WACHT",
      reasons,buy,sell,portfolioContext,
      overrideReason:`ETH gedaald ${portfolioContext.pctChange.toFixed(1)}% sinds aankoop op $${portfolioContext.buyPrice.toFixed(0)} — niet verkopen, wacht op herstel`};
  }

  // ── Eindscore met betrouwbaarheidspercentage ─────────────────────────────
  const tot=buy+sell;
  const dom=tot>0?Math.abs(buy-sell)/tot:0;
  // Betrouwbaarheid: 50% = neutraal, 95% = maximaal zeker
  const confidence=Math.min(95,Math.round(50+dom*45));
  let advice,strength;

  if(buy>sell&&dom>=0.4){
    advice="INSTAP";  // instapmoment (was KOOP)
    strength=dom>=0.65?"STERK":"MATIG";
  } else if(sell>buy&&dom>=0.4){
    advice="UITSTAP"; // uitstapmoment (was VERKOOP)
    strength=dom>=0.65?"STERK":"MATIG";
  } else{
    advice="WACHT";
    strength="NEUTRAAL";
  }

  const tp1=fib?fib.ext127:null;
  const tp2=fib?fib.ext162:null;

  return{rsi,e20,e50,e200,macdBull,bb,fib,alligator,advice,strength,confidence,reasons,buy,sell,portfolioContext,tp1,tp2,regime:state.regime};
}

function deriveSignal(id,val,ch){
  if(id==="sp500")return ch<-10?"danger":ch<-3?"bear":ch>5?"bull":"neutral";
  if(id==="vix")return val>35?"danger":val>25?"warning":val>18?"neutral":"bull";
  if(id==="gold")return ch>0?"bull":ch<-5?"bear":"neutral";
  if(id==="dollar")return ch<-5?"bear":ch>5?"bull":"neutral";
  if(id==="oil")return ch>30?"danger":ch>10?"warning":ch<-15?"bear":"neutral";
  if(id==="yield")return val>5?"warning":val<3?"bull":"neutral";
  return"neutral";
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else{e.setAttribute(k,v);}
  }
  for(const c of children){
    if(typeof c==="string")e.appendChild(document.createTextNode(c));
    else if(c)e.appendChild(c);
  }
  return e;
}
function s(css){const e=document.createElement("span");e.style.cssText=css;return e;}
function div(style,children=[]){return el("div",{style},children);}

  const tijd=now.toLocaleTimeString("nl-NL");
  document.getElementById("clock").textContent=datum+" · "+tijd;
}

// ─── Tab colors ───────────────────────────────────────────────────────────────
function getTabColor(){
  if(state.tab==="crypto"){
    const a=state.eth?.advice;
    return a==="INSTAP"?"#00C896":a==="UITSTAP"?"#EF4444":"#F97316";
  }
  if(state.tab==="alternative") return "#A855F7";
  if(state.tab==="chart") return "#4A9EFF";
  const items=state.classicItems;
  const sigs=items.map(i=>i.signal);
  const bc=sigs.filter(s=>s==="bear"||s==="danger").length;
  const blc=sigs.filter(s=>s==="bull").length;
  return bc>=4?"#FF2D55":bc>=3?"#FF4D6D":bc>=2?"#FF8C42":blc>=3?"#00C896":"#4A9EFF";
}

  }

  // Waarde
  const valEl=document.getElementById("banner-value");
  valEl.style.color=tabColor;
  if(state.tab==="crypto"){
    const dispPrice=state.ethEurPrice||(state.eth?.priceEur)||(state.eth?.price?(state.eth.price/(state.eurUsd||1.09)):null);

  // Counts

  countsEl.innerHTML="";

    subEl.textContent=`Gebaseerd op ${items.length} indicatoren. Klik voor toelichting.`;

}

  const sigs=(state.tab==="classic"?state.classicItems:getALT()).map(i=>i.signal);
  const bc=sigs.filter(s=>s==="bear"||s==="danger").length;
  const blc=sigs.filter(s=>s==="bull").length;
  return bc>=4?"danger":bc>=2?"warning":blc>=3?"bull":"neutral";
}

  const sigs=(state.tab==="classic"?state.classicItems:getALT()).map(i=>i.signal);
  const bc=sigs.filter(s=>s==="bear"||s==="danger").length;
  const blc=sigs.filter(s=>s==="bull").length;
  return bc>=4?"RECESSIERISICO HOOG":bc>=3?"OVERWEGEND NEGATIEF":bc>=2?"GEMENGD / VOORZICHTIG":blc>=3?"OVERWEGEND POSITIEF":"NEUTRAAL";
}

function renderCard(item){

  const card=el("div",{class:"card",style:{borderColor:exp?c.border:"rgba(255,255,255,0.07)",boxShadow:exp?`0 0 24px ${c.bg}`:"none"}});

          (item.fast||item.live)?el("span",{style:{fontSize:"0.5rem",color:"#00C896",border:"1px solid rgba(0,200,150,0.4)",borderRadius:"3px",padding:"1px 4px"}},["LIVE"]):null

      div({fontSize:"0.8rem",fontWeight:"600",color:isGood?"#00C896":"#FF4D6D",fontFamily:"'Space Mono',monospace",marginTop:"6px"},[(isPos?"▲":"▼")+" "+item.ytd])
    ])

  card.appendChild(div({fontSize:"0.72rem",color:"#999",lineHeight:"1.5",marginBottom:exp?"12px":"0"},[item.desc]));

// ─── Hourly signals — buiten render cyclus ───────────────────────────────────
async function loadHourlySignals(){
  try{
    let candles=null;
    // 1. Via Worker
    try{const d=await workerFetch("/market/eth1h");if(Array.isArray(d))candles=d;}catch(_){}
    // 2. Binance direct
    if(!candles)try{const r=await fetch("https://api.binance.com/api/v3/klines?symbol=ETHEUR&interval=1h&limit=60",{signal:AbortSignal.timeout(8000)});if(r.ok)candles=await r.json();}catch(_){}
    // 3. allorigins proxy
    if(!candles)try{const u=encodeURIComponent("https://api.binance.com/api/v3/klines?symbol=ETHEUR&interval=1h&limit=60");const r=await fetch(`https://api.allorigins.win/get?url=${u}`,{signal:AbortSignal.timeout(12000)});const d=await r.json();candles=JSON.parse(d.contents);}catch(_){}

    if(!candles||!Array.isArray(candles)||!candles.length){
      const listEl=document.getElementById("hourly-list");
      if(listEl){listEl.innerHTML="<div style='font-size:0.7rem;color:#444;font-style:italic;padding:4px'>Geen data beschikbaar.</div>";}
      return;
    }

    const closes=candles.map(c=>parseFloat(c[4]));
    const times=candles.map(c=>c[0]);
    const now=Date.now();
    const results=[];
    let correct=0,incorrect=0,wachtCorrect=0,wachtIncorrect=0;

    for(let i=24;i<candles.length;i++){
      const slice=closes.slice(0,i+1);
      const price=closes[i];
      const time=times[i];
      const ageH=(now-time)/3600000;
      const sig=buildSignals(price,((price-closes[i-1])/closes[i-1])*100,slice,null);

      // Evalueer signaal — alleen als oud genoeg (4 uur)
      let evalResult=null; // null=nog niet, true=correct, false=fout
      const isNow=i===candles.length-1;

      if(!isNow&&ageH>=4&&i+4<candles.length){
        const futurePrice=closes[i+4]; // 4 uur later
        const move=Math.abs((futurePrice-price)/price)*100;
        if(sig.advice==="INSTAP"){
          evalResult=futurePrice>price;
          if(evalResult)correct++;else incorrect++;
        } else if(sig.advice==="UITSTAP"){
          evalResult=futurePrice<price;
          if(evalResult)correct++;else incorrect++;
        } else if(sig.advice==="WACHT"){
          // WACHT correct als prijs <1% beweegt
          evalResult=move<1.0;
          if(evalResult)wachtCorrect++;else wachtIncorrect++;
        }
      }

      results.push({advice:sig.advice,strength:sig.strength,confidence:sig.confidence,price,time,evalResult,isNow,buy:sig.buy,sell:sig.sell,rsi:sig.rsi});
    }

    // Accuracy alleen op INSTAP/UITSTAP
    const total=correct+incorrect;
    const accPct=total>0?Math.round((correct/total)*100):null;
    const accColor=accPct===null?"#444":accPct>=60?"#00C896":accPct>=40?"#F0A500":"#FF4D6D";
    const accText=accPct!==null?`🎯 ${accPct}% correct · ${total} signalen`:"🎯 Data verzamelen...";
    state._hourlyAccText=accText;
    state._hourlyAccColor=accColor;
    const badgeEl=document.getElementById("hourly-acc-badge");
    if(badgeEl){badgeEl.textContent=accText;badgeEl.style.color=accColor;}

    // Render — meest recente bovenaan
    const listEl=document.getElementById("hourly-list");
    if(!listEl)return;
    listEl.innerHTML="";

    results.slice(-24).reverse().forEach((s,idx)=>{
      const c=s.advice==="INSTAP"?"#00C896":s.advice==="UITSTAP"?"#FF4D6D":"#F0A500";
      // Evaluatie icoon
      let evalIcon="",evalColor="#333";
      if(s.isNow){
        evalIcon="← nu";evalColor="#F0A500";
      } else if(s.evalResult===true){
        evalIcon="✓";evalColor="#00C896";
      } else if(s.evalResult===false){
        evalIcon="✗";evalColor="#FF4D6D";
      } else {
        evalIcon="…";evalColor="#333"; // te recent, nog niet geëvalueerd
      }

      const row=div({
        display:"flex",justifyContent:"space-between",alignItems:"center",
        padding:"6px 8px",
        borderRadius:s.isNow?"6px":"0",
        borderBottom:idx<23?"1px solid rgba(255,255,255,0.04)":"none",
        background:s.isNow?`${c}0d`:"transparent",
        fontSize:"0.65rem",fontFamily:"'Space Mono',monospace"
      },[
        el("span",{style:{color:c,fontWeight:"700",minWidth:"110px"}},[
          s.advice+(s.confidence?` ${s.confidence}%`:"")+( s.strength==="STERK"?" ★":"")
        ]),
        el("span",{style:{color:"#777"}},["€"+Math.round(s.price).toLocaleString("nl-NL")]),
        el("span",{style:{color:"#444",fontSize:"0.6rem"}},[new Date(s.time).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})]),
        el("span",{style:{color:"#555",fontSize:"0.58rem"}},[`${s.buy.toFixed(1)}↑${s.sell.toFixed(1)}↓`]),
        el("span",{style:{color:evalColor,fontWeight:"700",minWidth:"30px",textAlign:"right"}},[evalIcon])
      ]);
      listEl.appendChild(row);
    });

    state._hourlyRows=listEl.innerHTML;
    state._hourlyLoaded=Date.now();
    state._hourlyResults=results;
    state._hourlyCandles=candles;
    updateEthBannerFromHourly();
  }catch(e){
    console.warn("Hourly signals fout:",e.message);
    const listEl=document.getElementById("hourly-list");
    if(listEl){listEl.innerHTML="<div style='font-size:0.7rem;color:#444;font-style:italic;padding:4px'>Fout bij laden.</div>";}
  }finally{
    state._hourlyLoading=false;
  }
}

// Banner bijwerken vanuit hourly results (één bron van waarheid)
function updateEthBannerFromHourly(){
  if(!state._hourlyResults||!state._hourlyResults.length)return;
  // Meest recente signaal
  const latest=state._hourlyResults[state._hourlyResults.length-1];
  if(!latest)return;
  // Update state.eth advies vanuit hourly zodat banner klopt
  if(state.eth){
    state.eth.advice=latest.advice;
    state.eth.confidence=latest.confidence;
    state.eth.strength=latest.strength;
    state.eth.buy=latest.buy;
    state.eth.sell=latest.sell;
  }
  updateBanner();
}

// Hourly refresh timer — eenmalig starten
if(!state._hourlyTimer){
  state._hourlyTimer=setInterval(()=>{
    state._hourlyLoaded=null;
    if(state.tab==="crypto")loadHourlySignals();
  },5*60*1000);
}

  wrap.appendChild(div({textAlign:"center",padding:"20px 0 16px",borderBottom:"1px solid rgba(255,255,255,0.06)",marginBottom:"20px"},[
    div({fontSize:"2.5rem",fontWeight:"900",color:accColor,fontFamily:"'Playfair Display',serif"},
      [accPct!==null?`${accPct}%`:"—"]),
    div({fontSize:"0.65rem",color:"#555",fontFamily:"'Space Mono',monospace",letterSpacing:"0.12em",marginTop:"4px"},
      [accPct!==null?`🎯 ACCURACY · ${ev.length} SIGNALEN GEËVALUEERD`:"🎯 DATA VERZAMELEN..."])
  ]));

  // SVG grafiek
  const candles=state._hourlyCandles||[];
  const last24=candles.slice(-24);

  if(last24.length<2){
    wrap.appendChild(div({fontSize:"0.7rem",color:"#444",fontStyle:"italic",textAlign:"center",padding:"40px 0"},["Grafiek data laden..."]));
    frag.appendChild(wrap);return frag;
  }

  const closes=last24.map(c=>parseFloat(c[4]));
  const times=last24.map(c=>c[0]);
  const minP=Math.min(...closes);
  const maxP=Math.max(...closes);
  const range=maxP-minP||1;

  const W=340,H=160,padL=8,padR=8,padT=16,padB=24;
  const chartW=W-padL-padR;
  const chartH=H-padT-padB;

  const px=(i)=>padL+i*(chartW/(last24.length-1));
  const py=(price)=>padT+chartH-(((price-minP)/range)*chartH);

  // Bouw SVG path
  let pathD=`M ${px(0)} ${py(closes[0])}`;
  closes.forEach((c,i)=>{if(i>0)pathD+=` L ${px(i)} ${py(c)}`;});

  // Gradient fill onder de lijn
  const fillD=pathD+` L ${px(closes.length-1)} ${padT+chartH} L ${padL} ${padT+chartH} Z`;

  // Signaalmarkeringen
  const signalMarkers=[];
  const last24results=results.slice(-24);
  last24results.forEach((s,idx)=>{
    if(s.advice==="WACHT")return;
    const ci=closes.length-last24results.length+idx;
    if(ci<0||ci>=closes.length)return;
    const x=px(ci);
    const y=py(closes[ci]);
    const isInstap=s.advice==="INSTAP";
    const col=isInstap?"#00C896":"#FF4D6D";
    const evalCol=s.evalResult===true?"#00C896":s.evalResult===false?"#FF4D6D":"#666";
    signalMarkers.push({x,y,col,evalCol,evalResult:s.evalResult,advice:s.advice,isInstap});
  });

  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svg.setAttribute("width","100%");
  svg.style.cssText="display:block;overflow:visible";

  // Defs gradient
  svg.innerHTML=`
    <defs>
      <linearGradient id="ethGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#4A9EFF" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#4A9EFF" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Subtiele gridlijnen -->
    <line x1="${padL}" y1="${padT}" x2="${W-padR}" y2="${padT}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="${padL}" y1="${padT+chartH/2}" x2="${W-padR}" y2="${padT+chartH/2}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    <line x1="${padL}" y1="${padT+chartH}" x2="${W-padR}" y2="${padT+chartH}" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <!-- Prijslabels -->
    <text x="${W-padR+4}" y="${padT+4}" fill="#555" font-size="7" font-family="'Space Mono',monospace">€${Math.round(maxP)}</text>
    <text x="${W-padR+4}" y="${padT+chartH+4}" fill="#555" font-size="7" font-family="'Space Mono',monospace">€${Math.round(minP)}</text>
    <!-- Fill gradient -->
    <path d="${fillD}" fill="url(#ethGrad)"/>
    <!-- Prijs lijn -->
    <path d="${pathD}" fill="none" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Tijdlabels -->
    ${[0,6,12,18,23].map(i=>`<text x="${px(i)}" y="${H-4}" fill="#444" font-size="7" font-family="'Space Mono',monospace" text-anchor="middle">${new Date(times[i]||0).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})}</text>`).join("")}
    <!-- Signaalmarkeringen -->
    ${signalMarkers.map(m=>{
      const tri=m.isInstap
        ?`<polygon points="${m.x},${m.y-14} ${m.x-5},${m.y-6} ${m.x+5},${m.y-6}" fill="${m.col}" opacity="0.9"/>`
        :`<polygon points="${m.x},${m.y+14} ${m.x-5},${m.y+6} ${m.x+5},${m.y+6}" fill="${m.col}" opacity="0.9"/>`;
      const evalDot=m.evalResult!==null
        ?`<circle cx="${m.x}" cy="${m.isInstap?m.y-18:m.y+18}" r="3" fill="${m.evalCol}"/>`:"";
      return tri+evalDot;
    }).join("")}
  `;

  wrap.appendChild(div({background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px 12px 8px",marginBottom:"16px"},[svg]));

  // Legenda
  wrap.appendChild(div({display:"flex",gap:"16px",justifyContent:"center",fontSize:"0.6rem",color:"#555",fontFamily:"'Space Mono',monospace",marginBottom:"20px"},[
    div({display:"flex",alignItems:"center",gap:"4px"},[
      el("span",{style:{display:"inline-block",width:"0",height:"0",borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderBottom:"8px solid #00C896"}},[]),
      el("span",{},["INSTAP"])
    ]),
    div({display:"flex",alignItems:"center",gap:"4px"},[
      el("span",{style:{display:"inline-block",width:"0",height:"0",borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderTop:"8px solid #FF4D6D"}},[]),
      el("span",{},["UITSTAP"])
    ]),
    div({display:"flex",alignItems:"center",gap:"4px"},[
      el("span",{style:{display:"inline-block",width:"8px",height:"8px",borderRadius:"50%",background:"#00C896"}},[]),
      el("span",{},["✓ CORRECT"])
    ]),
    div({display:"flex",alignItems:"center",gap:"4px"},[
      el("span",{style:{display:"inline-block",width:"8px",height:"8px",borderRadius:"50%",background:"#FF4D6D"}},[]),
      el("span",{},["✗ FOUT"])
    ])
  ]));

  frag.appendChild(wrap);
  return frag;
}

// ─── Pull-to-refresh ─────────────────────────────────────────────────────────
(function initPullToRefresh(){
  let startY=0,pulling=false,triggered=false;
  const threshold=80; // pixels om te trekken

  function getIndicator(){return document.querySelector(".ptr-indicator");}

  document.addEventListener("touchstart",e=>{
    // Alleen in ETH tab en alleen als scroll bovenaan staat
    if(state.tab!=="crypto")return;
    const scrollEl=document.querySelector(".ptr-container");
    if(scrollEl&&scrollEl.scrollTop>5)return;
    startY=e.touches[0].clientY;
    pulling=true;triggered=false;
  },{passive:true});

  document.addEventListener("touchmove",e=>{
    if(!pulling)return;
    const dy=e.touches[0].clientY-startY;
    if(dy<0){pulling=false;return;}
    const ind=getIndicator();
    if(!ind)return;
    const pct=Math.min(dy/threshold,1);
    if(dy>20){
      ind.style.color=pct>=1?"#00C896":"#444";
      ind.textContent=pct>=1?"↑ Loslaten om te verversen...":"↓ Trek omlaag om te verversen";
      ind.style.height=Math.min(dy*0.4,60)+"px";
    }
  },{passive:true});

  document.addEventListener("touchend",e=>{
    if(!pulling)return;
    pulling=false;
    const dy=e.changedTouches[0].clientY-startY;
    const ind=getIndicator();
    if(dy>=threshold&&!triggered){
      triggered=true;
      if(ind){ind.textContent="⟳ Verversen...";ind.style.color="#F0A500";}
      // Refresh alles
      state._hourlyLoaded=null;
      state._hourlyLoading=false;
      Promise.all([fetchFast(),fetchSlow(),fetchBTCPrice(),loadHourlySignals()]).then(()=>{
        if(ind){ind.style.height="0px";ind.textContent="";setTimeout(()=>{ind.style.height="40px";ind.textContent="↓ Trek omlaag om te verversen";ind.style.color="#333";},500);}
      });
    } else {
      if(ind){ind.style.height="40px";ind.style.color="#333";ind.textContent="↓ Trek omlaag om te verversen";}
    }
  },{passive:true});
})();

// ─── Classic data fetchers ────────────────────────────────────────────────────
async function workerFetch(path){
  const keys=loadBitvavoKeys();
  if(!keys.workerUrl)return null;
  try{
    const base=keys.workerUrl.replace(/\/bitvavo$/,"");
    const res=await fetch(base+"/bitvavo"+path,{signal:AbortSignal.timeout(8000)});
    if(!res.ok)return null;
    return await res.json();
  }catch(_){return null;}
}

async function fetchFast(){
  state.fastRefreshing=true;
  const keys=loadBitvavoKeys();

  if(keys.workerUrl){
    // Goud via Worker → metals.live
    try{
      const d=await workerFetch("/market/gold");
      if(d?.gold){const price=d.gold;const prev=d.gold_prev||price;const c=((price-prev)/prev)*100;applyLive("gold",{value:`$${Math.round(price).toLocaleString("nl-NL")}`,change:c,ytd:fp(c)});}
      else{
        // Fallback via Worker → Yahoo GC=F
        const d2=await workerFetch("/market/gold_yf");
        const meta=d2?.chart?.result?.[0]?.meta;
        if(meta?.regularMarketPrice){const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;applyLive("gold",{value:`$${Math.round(price).toLocaleString("nl-NL")}`,change:c,ytd:fp(c)});}
      }
    }catch(_){}
    // Brent olie via Worker → Yahoo BZ=F
    try{
      const d=await workerFetch("/market/oil");
      const meta=d?.chart?.result?.[0]?.meta;
      if(meta){const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;applyLive("oil",{value:`$${price.toFixed(1)}`,change:c,ytd:fp(c)});}
    }catch(_){}
  } else {
    // Directe calls als geen Worker — werkt alleen in Chrome
    try{const res=await fetch("https://metals.live/api/latest",{signal:AbortSignal.timeout(5000)});const d=await res.json();if(d?.gold){const c=((d.gold-(d.gold_prev||d.gold))/(d.gold_prev||d.gold))*100;applyLive("gold",{value:`$${Math.round(d.gold).toLocaleString("nl-NL")}`,change:c,ytd:fp(c)});}}catch(_){}
    try{const res=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=2d",{signal:AbortSignal.timeout(6000)});const d=await res.json();const meta=d?.chart?.result?.[0]?.meta;if(meta){const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;applyLive("oil",{value:`$${price.toFixed(1)}`,change:c,ytd:fp(c)});}}catch(_){}
  }
  state.fastRefreshing=false;
  if(state.tab!=="crypto")renderContent();
}
async function fetchSlow(){
  function parseYF(d,id,dec=0){
    const meta=d?.chart?.result?.[0]?.meta;if(!meta)return;
    const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;
    if(id==="sp500")applyLive("sp500",{value:price.toLocaleString("nl-NL",{maximumFractionDigits:0}),change:c,ytd:fp(c)});
    if(id==="vix")  applyLive("vix",  {value:price.toFixed(1),change:c,ytd:fp(c)});
    if(id==="yield")applyLive("yield",{value:`${price.toFixed(2)}%`,change:c,ytd:fp(c,2)});
    if(id==="dollar")applyLive("dollar",{value:price.toFixed(1),change:c,ytd:fp(c)});
  }
  // Altijd via Worker als beschikbaar, anders direct
  const routes=[
    ["sp500","/market/sp500"],
    ["vix",  "/market/vix"],
    ["yield","/market/yield"],
    ["dollar","/market/dxy"],
  ];
  for(const[id,wPath]of routes){
    try{
      const d=await workerFetch(wPath);
      if(d)parseYF(d,id);
    }catch(_){}
  }
  if(state.tab!=="crypto")renderContent();
}
function applyLive(id,data){
  state.classicItems=state.classicItems.map(item=>{
    if(item.id!==id)return item;
    return{...item,...data,signal:deriveSignal(id,parseFloat(data.value),data.change)};
  });
  state.lastLiveUpdate=new Date();
  updateDataStatusBar();
}

    async()=>{const r=await fetch("https://min-api.cryptocompare.com/data/pricemultifull?fsyms=ETH&tsyms=USD",{signal:AbortSignal.timeout(6000)});const d=await r.json();const e=d.RAW?.ETH?.USD;return{price:e?.PRICE,ch24:e?.CHANGEPCT24HOUR};},
    async()=>{const r=await fetch("https://api.kraken.com/0/public/Ticker?pair=XETHZUSD",{signal:AbortSignal.timeout(6000)});const d=await r.json();const t=d.result?.XETHZUSD;return{price:parseFloat(t?.c?.[0]),ch24:((parseFloat(t?.c?.[0])-parseFloat(t?.o))/parseFloat(t?.o))*100};},
    async()=>{const r=await fetch("https://min-api.cryptocompare.com/data/price?fsym=ETH&tsyms=USD",{signal:AbortSignal.timeout(6000)});const d=await r.json();return{price:d.USD,ch24:0};},
    async()=>{const r=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/ETH-USD?interval=1m&range=1d",{signal:AbortSignal.timeout(6000)});const d=await r.json();const m=d?.chart?.result?.[0]?.meta;return{price:m?.regularMarketPrice,ch24:((m?.regularMarketPrice-m?.previousClose)/m?.previousClose)*100};},
  ];
  for(const src of sources){
    try{
      const{price,ch24}=await src();
      if(!price||isNaN(price))continue;
      const closes=state.closesArr.length>0?state.closesArr:[price];
      const sig=buildSignals(price,ch24||0,closes,state.portfolio);
      const priceEur=price/state.eurUsd;
      state.eth={price,priceEur,eurUsd:state.eurUsd,change24:ch24||0,...sig,timestamp:new Date()};
      state.ethLoading=false;
      updateHistory(price,sig);
      sendETHNotif(price,sig);
      if(state.tab==="crypto")renderContent();else updateBanner();
      return;
    }catch(_){}
  }
  state.eth={errorMsg:"Geen ETH data beschikbaar"};
  state.ethLoading=false;
  if(state.tab==="crypto")renderContent();
}

function updateHistory(price,sig){
  const last=state.history[state.history.length-1];
  if(!last||last.advice!==sig.advice){
    const updated=state.history.map(s=>{
      if(s.result!==null||!s.price)return s;
      const ageH=(Date.now()-new Date(s.time))/3600000;
      if(ageH>=4){const ok=(s.advice==="INSTAP"&&price>s.price)||(s.advice==="UITSTAP"&&price<s.price);return{...s,result:s.advice==="WACHT"?null:ok};}
      return s;
    });
    const pEur=state.ethEurPrice||(price/(state.eurUsd||1.09));
    state.history=[...updated,{advice:sig.advice,strength:sig.strength,confidence:sig.confidence,price,priceEur:pEur,time:new Date().toISOString(),result:null}];
    saveHi(state.history);
    // Log ook voor leermodule evaluatie
    if(sig.advice!=="WACHT")logSignal(sig.advice,sig.confidence,price,pEur);
  }
  // Evalueer oude signalen
  evaluateSignalLog(price);
}

function sendETHNotif(price,sig){
  if(!sig||sig.advice==="HOUD"||sig.overrideReason)return;
  const isStrong=sig.strength==="STERK";
  const isNew=state.lastAdv!==`${sig.advice}-${sig.strength}`;
  const today=new Date().toDateString();
  if(!state.notifTodayDate||state.notifTodayDate!==today){state.notifToday=0;state.notifTodayDate=today;}
  if(isStrong&&isNew&&state.notifToday<2&&typeof Notification!=="undefined"&&Notification.permission==="granted"){
    const h=new Date().getHours();
    if(h<21&&h>=7){
      const perc=sig.pct50?"50%":"100%";
      const fibMsg=sig.fib&&sig.advice==="KOOP"&&price>=sig.fib.fib650&&price<=sig.fib.fib618?" 📐 Golden Pocket!":"";
      try{new Notification(`🚨 ETH ${sig.advice} ${perc} — URGENT`,{body:`$${Math.round(price).toLocaleString("nl-NL")} · RSI ${sig.rsi?.toFixed(0)} · ${sig.buy}v${sig.sell}${fibMsg}`});}catch(_){}
      state.notifToday++;
      state.lastAdv=`${sig.advice}-${sig.strength}`;
    }
  }
}

function connectWS(){
  try{
    ws=new WebSocket("wss://stream.binance.com:9443/stream?streams=ethusdt@ticker/ethusdt@kline_4h");
    ws.onopen=()=>{state.ethLoading=false;if(state.tab==="crypto")renderContent();};
    ws.onmessage=(ev)=>{
      try{
        const msg=JSON.parse(ev.data);
        if(msg.stream==="ethusdt@ticker"){
          const price=parseFloat(msg.data.c);
          const ch24=parseFloat(msg.data.P);
          const closes=state.closesArr.length>0?state.closesArr:[price];
          const sig=buildSignals(price,ch24,closes,state.portfolio);
          const priceEur=price/state.eurUsd;
          state.eth={price,priceEur,eurUsd:state.eurUsd,change24:ch24,...sig,timestamp:new Date()};
          state.ethLoading=false;
          updateHistory(price,sig);
          sendETHNotif(price,sig);
          if(state.tab==="crypto")renderContent();else updateBanner();
        }
        if(msg.stream==="ethusdt@kline_4h"&&msg.data.k?.x){
          state.closesArr=[...state.closesArr.slice(-60),parseFloat(msg.data.k.c)];
        }
      }catch(_){}
    };
    ws.onerror=()=>{state.eth={errorMsg:"WebSocket fout — herverbinden..."};if(state.tab==="crypto")renderContent();};
    ws.onclose=()=>{reconnTimer=setTimeout(connectWS,3000);};
  }catch(e){state.eth={errorMsg:e.message};state.ethLoading=false;if(state.tab==="crypto")renderContent();}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderAll();
// Probeer eerst WebSocket, als die faalt gebruik REST API polling
connectWS();
// Altijd ook REST polling als backup (elke 30s)
fetchEurUsd();
fetchBTCPrice();
setInterval(fetchBTCPrice,30000);
setInterval(fetchEurUsd,30*60*1000);
// Auto-sync Bitvavo bij laden als keys aanwezig
const _bvKeys=loadBitvavoKeys();
if(_bvKeys.workerUrl){syncBitvavo();setInterval(syncBitvavo,5*60*1000);}
// Start leermodule op achtergrond
state.weights=loadWeights()?.weights||null;
state.signalLog=loadSignalLog();
initLearning();
setInterval(initLearning,24*3600*1000);
fetchFast();fetchSlow();fetchAltLive();
setInterval(fetchFast,5*60*1000);   // goud + olie: elke 5 min
setInterval(fetchSlow,15*60*1000);  // S&P, VIX, rente, dollar: elke 15 min
setInterval(fetchAltLive,5*60*1000);
</script>
