*{box-sizing:border-box;margin:0;padding:0}
/* Altijd donker — geen light mode */
html{background:#0A0C0F!important;color:#F5F0E8!important;color-scheme:dark;height:100%}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#0A0C0F!important}
#content{flex:1}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0A0C0F}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* Desktop: 3 kolommen naast elkaar */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:0 28px 40px}

/* Tablet: 2 kolommen */
@media(max-width:1024px) and (min-width:601px){
  .card-grid{grid-template-columns:repeat(2,1fr)}
}

/* Mobiel: 1 kolom */

// ─── Bitvavo API ──────────────────────────────────────────────────────────────
function loadBitvavoKeys(){try{return JSON.parse(localStorage.getItem("mr_bv"))||{key:"",secret:""};}catch{return{key:"",secret:""};}}
function saveBitvavoKeys(k){try{localStorage.setItem("mr_bv",JSON.stringify(k));}catch(_){}}

async function bitvavoSign(method,path,body=""){
  const keys=loadBitvavoKeys();
  if(!keys.key||!keys.secret)return null;
  const ts=Date.now();
  const msg=ts+method+"/v2"+path+(body||"");
  // HMAC-SHA256 via Web Crypto API
  const enc=new TextEncoder();
  const keyObj=await crypto.subtle.importKey("raw",enc.encode(keys.secret),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
  const sig=await crypto.subtle.sign("HMAC",keyObj,enc.encode(msg));
  const hex=Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,"0")).join("");
  return{key:keys.key,sig:hex,ts};
}

async function bitvavoFetch(path,method="GET",body=null){
  const auth=await bitvavoSign(method,path,body?JSON.stringify(body):"");
  if(!auth)return null;
  const headers={
    "Content-Type":"application/json",
    "Bitvavo-Access-Key":auth.key,
    "Bitvavo-Access-Signature":auth.sig,
    "Bitvavo-Access-Timestamp":String(auth.ts),
    "Bitvavo-Access-Window":"10000",
  };
  try{
    const res=await fetch(`https://api.bitvavo.com/v2${path}`,{
      method,headers,
      body:body?JSON.stringify(body):undefined,
      signal:AbortSignal.timeout(8000)
    });
    if(!res.ok){const e=await res.json();throw new Error(e.errorCode+": "+e.error);}
    return await res.json();
  }catch(e){
    console.warn("Bitvavo API fout:",e.message);
    return{error:e.message};
  }
}

async function fetchBitvavoBalance(){
  const data=await bitvavoFetch("/balance");
  if(!data||data.error)return null;
  // Zoek ETH en EUR balances
  const eth=data.find(b=>b.symbol==="ETH");
  const eur=data.find(b=>b.symbol==="EUR");
  return{
    eth:parseFloat(eth?.available||0)+parseFloat(eth?.inOrder||0),
    ethAvailable:parseFloat(eth?.available||0),
    eur:parseFloat(eur?.available||0)+parseFloat(eur?.inOrder||0),
    eurAvailable:parseFloat(eur?.available||0),
  };
}

async function fetchBitvavoTrades(){
  const data=await bitvavoFetch("/ETH-EUR/trades?limit=20");
  if(!data||data.error)return null;
  return data.map(t=>({
    type:t.side==="buy"?"buy":"sell",
    price:parseFloat(t.price),
    priceUsd:parseFloat(t.price)*(state.eurUsd||1.09),
    eth:parseFloat(t.amount),
    eur:parseFloat(t.price)*parseFloat(t.amount),
    fee:parseFloat(t.feePaid||0),
    pct:100,
    time:t.timestamp,
    bitvavoId:t.id,
  }));
}

async function syncBitvavo(){
  const keys=loadBitvavoKeys();
  if(!keys.key||!keys.secret){state.bitvavoStatus="no_key";return;}
  state.bitvavoStatus="syncing";
  // Haal saldo op
  const bal=await fetchBitvavoBalance();
  if(bal?.error||!bal){state.bitvavoStatus="error";return;}
  // Haal trades op
  const trades=await fetchBitvavoTrades();
  // Bouw portfolio op vanuit echte Bitvavo data
  const startValue=trades?trades.filter(t=>t.type==="buy").reduce((s,t)=>s+t.eur,0):state.portfolio.startValue;
  const newPf={
    eur:bal.eur,
    eth:bal.eth,
    startValue:startValue||state.portfolio.startValue,
    trades:trades||state.portfolio.trades,
    bitvavoSynced:new Date().toISOString(),

  savePf(newPf);
  state.bitvavoStatus="synced";
  state.bitvavoLastSync=new Date();
  if(state.tab==="crypto")renderContent();
  updateBanner();
}

// ─── Signalen ─────────────────────────────────────────────────────────────────
function calcRSI(cl,p=14){
  if(cl.length<p+1)return 50;
  let g=0,l=0;
  for(let i=cl.length-p;i<cl.length;i++){const d=cl[i]-cl[i-1];if(d>0)g+=d;else l-=d;}
  const ag=g/p,al=l/p;if(al===0)return 100;return 100-(100/(1+ag/al));
}
function calcEMA(cl,p){
  if(!cl||cl.length<p)return cl[cl.length-1]||0;
  const k=2/(p+1);let e=cl[0];for(let i=1;i<cl.length;i++)e=cl[i]*k+e*(1-k);return e;
}
// ─── SMA berekening ──────────────────────────────────────────────────────────
function calcSMA(cl,p){
  if(cl.length<p)return cl[cl.length-1]||0;
  return cl.slice(-p).reduce((a,b)=>a+b,0)/p;
}

// ─── Bollinger Bands ─────────────────────────────────────────────────────────
function calcBollinger(cl,p=20,mult=2){
  if(cl.length<p)return{upper:0,lower:0,mid:0};
  const slice=cl.slice(-p);
  const mid=slice.reduce((a,b)=>a+b,0)/p;
  const std=Math.sqrt(slice.reduce((a,b)=>a+(b-mid)**2,0)/p);
  return{upper:mid+mult*std,lower:mid-mult*std,mid};
}

// ─── Williams Alligator ──────────────────────────────────────────────────────
function calcAlligator(cl){
  // Jaw=13 SMMA shifted 8, Teeth=8 SMMA shifted 5, Lips=5 SMMA shifted 3
  function smma(arr,p){
    if(arr.length<p)return arr[arr.length-1]||0;
    let s=arr.slice(0,p).reduce((a,b)=>a+b,0)/p;
    for(let i=p;i<arr.length;i++)s=(s*(p-1)+arr[i])/p;
    return s;
  }
  return{
    jaw:smma(cl,13),
    teeth:smma(cl,8),
    lips:smma(cl,5),
  };
}

// ─── Fibonacci niveaus berekenen ─────────────────────────────────────────────
function calcFibonacci(closes){
  if(closes.length<20)return null;
  const recent=closes.slice(-50);
  const high=Math.max(...recent);
  const low=Math.min(...recent);
  const range=high-low;
  return{
    high,low,range,
    fib236:high-0.236*range,
    fib382:high-0.382*range,
    fib500:high-0.500*range,
    fib618:high-0.618*range, // Golden Pocket start
    fib650:high-0.650*range, // Golden Pocket eind
    fib786:high-0.786*range,
    ext127:high+0.272*range, // Take profit 1
    ext162:high+0.618*range, // Take profit 2
  };
}

// ─── Hoofdsignaal functie ────────────────────────────────────────────────────
function buildSignals(price,ch24,closes,portfolio){
  const rsi=calcRSI(closes,14);
  const e20=closes.length>=20?calcEMA(closes.slice(-20),20):price;
  const e50=closes.length>=50?calcEMA(closes.slice(-50),50):price;
  const e200=closes.length>=200?calcEMA(closes.slice(-200),200):closes.length>=50?calcEMA(closes,50):price;
  const macdBull=closes.length>=26?calcEMA(closes.slice(-12),12)>calcEMA(closes.slice(-26),26):ch24>0;
  const bb=calcBollinger(closes);
  const alligator=calcAlligator(closes);
  const fib=calcFibonacci(closes);

  // Alligator: lippen boven tanden boven kaak = opwaarts
  const alligatorBull=alligator.lips>alligator.teeth&&alligator.teeth>alligator.jaw;
  const alligatorBear=alligator.lips<alligator.teeth&&alligator.teeth<alligator.jaw;

  // Fibonacci Golden Pocket check
  const inGoldenPocket=fib&&price>=fib.fib650&&price<=fib.fib618;
  const nearResistance=fib&&price>=fib.high*0.97; // binnen 3% van vorige high

  // Bollinger checks
  const nearLowerBB=bb.lower>0&&price<=bb.lower*1.01;
  const nearUpperBB=bb.upper>0&&price>=bb.upper*0.99;

  // 200 SMA trend filter
  const aboveTrend=price>e200;

  // Portefeuille context: hoeveel % gestegen/gedaald sinds aankoop
  let portfolioContext=null;
  if(portfolio&&portfolio.eth>0&&portfolio.trades.length>0){
    const lastBuy=portfolio.trades.filter(t=>t.type==="buy").slice(-1)[0];
    if(lastBuy){
      // Vergelijk in USD als aankoopprijs in USD was (oude trades), anders EUR
      const buyPriceUsd=lastBuy.priceUsd||lastBuy.price;
      const pctChange=((price-buyPriceUsd)/buyPriceUsd)*100;
      portfolioContext={buyPrice:lastBuy.price,buyPriceUsd,pctChange,isDown10:pctChange<=-10};
    }
  }

  let buy=0,sell=0,reasons=[];

  // ── RSI (weging x2) ──────────────────────────────────────────────────────
  if(rsi<32){buy+=2;reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"buy",w:"Oververkocht (<32) — koopkans"});}
  else if(rsi>68){sell+=2;reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"sell",w:"Overkocht (>68) — verkoopkans"});}
  else{reasons.push({l:"RSI 4H",v:rsi.toFixed(0),verd:"hold",w:"Neutraal (32–68)"});}

  // ── Fibonacci Golden Pocket (weging x3) ───────────────────────────────────
  if(inGoldenPocket){
    buy+=3;
    reasons.push({l:"Fibonacci",v:"Golden Pocket",verd:"buy",w:`Prijs in 61.8–65% zone ($${fib.fib650.toFixed(0)}–$${fib.fib618.toFixed(0)}) — sterk koopniveau`});
  } else if(nearResistance){
    sell+=3;
    reasons.push({l:"Fibonacci",v:"Weerstand",verd:"sell",w:`Prijs dicht bij vorige top ($${fib.high.toFixed(0)}) — verkoopzone`});
  } else if(fib){
    const pct=((price-fib.low)/(fib.high-fib.low)*100).toFixed(0);
    reasons.push({l:"Fibonacci",v:`${pct}% herstel`,verd:"hold",w:`Prijs op ${pct}% van de recente range — neutraal`});
  }

  // ── 200 SMA trend (weging x2) ─────────────────────────────────────────────
  if(aboveTrend){buy+=2;reasons.push({l:"200 SMA",v:"↗ Boven",verd:"buy",w:"Prijs boven 200 SMA — lange termijn uptrend"});}
  else{sell+=2;reasons.push({l:"200 SMA",v:"↘ Onder",verd:"sell",w:"Prijs onder 200 SMA — lange termijn downtrend"});}

  // ── Williams Alligator (weging x1) ───────────────────────────────────────
  if(alligatorBull){buy+=1;reasons.push({l:"Alligator",v:"Eet ↑",verd:"buy",w:"Lippen > Tanden > Kaak — opwaartse trend"});}
  else if(alligatorBear){sell+=1;reasons.push({l:"Alligator",v:"Eet ↓",verd:"sell",w:"Lippen < Tanden < Kaak — neerwaartse trend"});}
  else{reasons.push({l:"Alligator",v:"Slaapt",verd:"hold",w:"Alligator slapend — zijwaartse markt"});}

  // ── MACD (weging x1) ─────────────────────────────────────────────────────
  if(macdBull){buy+=1;reasons.push({l:"MACD",v:"Bullish",verd:"buy",w:"Momentum omhoog"});}
  else{sell+=1;reasons.push({l:"MACD",v:"Bearish",verd:"sell",w:"Momentum omlaag"});}

  // ── Bollinger Bands (weging x1) ──────────────────────────────────────────
  if(nearLowerBB){buy+=1;reasons.push({l:"Bollinger",v:"Onder band",verd:"buy",w:"Prijs raakt onderste Bollinger band — oversold"});}
  else if(nearUpperBB){sell+=1;reasons.push({l:"Bollinger",v:"Boven band",verd:"sell",w:"Prijs raakt bovenste Bollinger band — overbought"});}
  else{reasons.push({l:"Bollinger",v:"In band",verd:"hold",w:"Prijs binnen Bollinger bands — neutraal"});}

  // ── 24H trend (weging x1) ────────────────────────────────────────────────
  if(ch24>3){buy+=1;reasons.push({l:"24H trend",v:`+${ch24.toFixed(1)}%`,verd:"buy",w:"Sterke stijging afgelopen 24u"});}
  else if(ch24<-3){sell+=1;reasons.push({l:"24H trend",v:`${ch24.toFixed(1)}%`,verd:"sell",w:"Sterke daling afgelopen 24u"});}
  else{reasons.push({l:"24H trend",v:`${ch24.toFixed(1)}%`,verd:"hold",w:"Beperkte beweging"});}

  // ── OVERRIDE: in positie en -10% ─────────────────────────────────────────
  if(portfolioContext?.isDown10){
    return{rsi,e20,e50,e200,macdBull,bb,fib,alligator,advice:"HOUD",strength:"WACHT",
      reasons,buy,sell,portfolioContext,
      overrideReason:`ETH gedaald ${portfolioContext.pctChange.toFixed(1)}% sinds aankoop op $${portfolioContext.buyPrice.toFixed(0)} — niet verkopen, wacht op herstel`};
  }

  // ── Eindscore ─────────────────────────────────────────────────────────────
  const tot=buy+sell;
  const dom=tot>0?Math.abs(buy-sell)/tot:0;
  let advice,strength,pct50=false;

  if(buy>sell&&dom>=0.5){
    advice="KOOP";strength=dom>=0.7?"STERK":"MATIG";
    pct50=dom<0.7; // matig = 50%
  } else if(sell>buy&&dom>=0.5){
    advice="VERKOOP";strength=dom>=0.7?"STERK":"MATIG";
    pct50=dom<0.7;
  } else{
    advice="HOUD";strength="NEUTRAAL";
  }

  // Take profit levels via Fibonacci
  const tp1=fib?fib.ext127:null;
  const tp2=fib?fib.ext162:null;

  return{rsi,e20,e50,e200,macdBull,bb,fib,alligator,advice,strength,pct50,reasons,buy,sell,portfolioContext,tp1,tp2};
}

function deriveSignal(id,val,ch){
  if(id==="sp500")return ch<-10?"danger":ch<-3?"bear":ch>5?"bull":"neutral";
  if(id==="vix")return val>35?"danger":val>25?"warning":val>18?"neutral":"bull";
  if(id==="gold")return ch>0?"bull":ch<-5?"bear":"neutral";
  if(id==="dollar")return ch<-5?"bear":ch>5?"bull":"neutral";
  if(id==="oil")return ch>30?"danger":ch>10?"warning":ch<-15?"bear":"neutral";
  if(id==="yield")return val>5?"warning":val<3?"bull":"neutral";
  return"neutral";
}

// ─── Render helpers ───────────────────────────────────────────────────────────
function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object"){Object.assign(e.style,v);}
    else if(k.startsWith("on")){e.addEventListener(k.slice(2).toLowerCase(),v);}
    else{e.setAttribute(k,v);}
  }
  for(const c of children){
    if(typeof c==="string")e.appendChild(document.createTextNode(c));
    else if(c)e.appendChild(c);
  }
  return e;
}
function s(css){const e=document.createElement("span");e.style.cssText=css;return e;}
function div(style,children=[]){return el("div",{style},children);}

          div({flex:"1",padding:"8px",background:"rgba(0,200,150,0.06)",borderRadius:"6px",textAlign:"center"},[
            div({fontSize:"0.55rem",color:"#555",fontFamily:"'Space Mono',monospace"},["TP1 (1.272)"]),
            div({fontSize:"0.9rem",fontWeight:"700",color:"#00C896",fontFamily:"'Space Mono',monospace"},["$"+Math.round(eth.tp1).toLocaleString("nl-NL")])
          ]),
          div({flex:"1",padding:"8px",background:"rgba(0,200,150,0.06)",borderRadius:"6px",textAlign:"center"},[

        [`⚡ Gemengd signaal — overweeg slechts 50% te ${eth.advice==="KOOP"?"kopen":"verkopen"}`]

    wrap.appendChild(indBox);
  }

  // ── Portefeuille ────────────────────────────────────────────────────────
  const pfBox=div({background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px",marginBottom:"16px"});
  pfBox.appendChild(div({fontSize:"0.6rem",color:"#555",letterSpacing:"0.15em",fontFamily:"'Space Mono',monospace",marginBottom:"12px"},["MIJN PORTEFEUILLE"]));

  // Waarde boxes
  pfBox.appendChild(div({display:"flex",gap:"10px",marginBottom:"12px"},[
    div({flex:"1",padding:"10px",background:"rgba(255,255,255,0.03)",borderRadius:"8px"},[
      div({fontSize:"0.55rem",color:"#555",fontFamily:"'Space Mono',monospace"},["TOTAAL WAARDE"]),
      div({fontSize:"1.2rem",fontWeight:"700",color:"#F5F0E8",fontFamily:"'Playfair Display',serif"},["€"+tot.toFixed(2)])
    ]),
    div({flex:"1",padding:"10px",background:pnl>=0?"rgba(0,200,150,0.06)":"rgba(255,77,109,0.06)",borderRadius:"8px"},[
      div({fontSize:"0.55rem",color:"#555",fontFamily:"'Space Mono',monospace"},["WINST / VERLIES"]),
      div({fontSize:"1.2rem",fontWeight:"700",color:pnl>=0?"#00C896":"#FF4D6D",fontFamily:"'Playfair Display',serif"},[(pnl>=0?"+":"")+"€"+pnl.toFixed(2)]),
      div({fontSize:"0.65rem",color:pnl>=0?"#00C896":"#FF4D6D",fontFamily:"'Space Mono',monospace"},[fp(pnlPct)])
    ])
  ]));

  // Cash + ETH + Bitvavo fee info
  pfBox.appendChild(div({fontSize:"0.7rem",color:"#666",fontFamily:"'Space Mono',monospace",marginBottom:eth?.price?"12px":"0"},
    [`💶 €${pf.eur.toFixed(2)} · Ξ ${pf.eth.toFixed(6)}${eth?.price?" · waarde €"+(pf.eth*eth.price).toFixed(2):""}`]
  ));

  // Positie context: % stijging/daling sinds aankoop
  if(eth?.portfolioContext&&pf.eth>0){
    const pc=eth.portfolioContext;
    const pcColor=pc.pctChange>=0?"#00C896":"#FF4D6D";
    pfBox.appendChild(div({fontSize:"0.72rem",color:pcColor,fontFamily:"'Space Mono',monospace",marginBottom:"12px",padding:"8px 10px",background:`${pcColor}0d`,borderRadius:"6px",border:`1px solid ${pcColor}22`},
      [`${pc.pctChange>=0?"▲":"▼"} ${pc.pctChange.toFixed(2)}% sinds aankoop op $${pc.buyPrice.toFixed(0)} · Bitvavo fee 0.25% inbegrepen`]
    ));
  }

  // Knoppen
  if(eth?.price){
    const koopPct=eth.pct50&&eth.advice==="KOOP"?"50%":"100%";
    const verkPct=eth.pct50&&eth.advice==="VERKOOP"?"50%":"100%";
    const btnRow=div({display:"flex",gap:"10px"});
    const buyBtn=el("button",{class:"trade-btn",style:{background:pf.eur>=1?"#00C896":"#1a2e2a",color:pf.eur>=1?"#0A0C0F":"#333"}},
      [`↑ KOOP ${koopPct}`]);
    if(pf.eur<1)buyBtn.disabled=true;
    const sellBtn=el("button",{class:"trade-btn",style:{background:pf.eth>=0.000001?"#FF4D6D":"#2e1a1e",color:pf.eth>=0.000001?"#0A0C0F":"#333"}},
      [`↓ VERKOOP ${verkPct}`]);
    if(pf.eth<0.000001)sellBtn.disabled=true;

    buyBtn.addEventListener("click",()=>{
      if(pf.eur<1)return;
      const factor=eth.pct50&&eth.advice==="KOOP"?0.5:1.0;
      const eurSpend=pf.eur*factor;
      const fee=eurSpend*0.0025;
      const ethBought=(eurSpend-fee)/(eth.priceEur||eth.price/(eth.eurUsd||1.09));
      const next={...pf,eth:pf.eth+ethBought,eur:pf.eur-eurSpend,
        trades:[...pf.trades,{type:"buy",price:eth.priceEur||eth.price/(eth.eurUsd||1.09),priceUsd:eth.price,eth:ethBought,eur:eurSpend,fee,pct:factor*100,time:Date.now()}]};
      state.portfolio=next;savePf(next);renderContent();updateBanner();
    });
    sellBtn.addEventListener("click",()=>{
      if(pf.eth<0.000001)return;
      const factor=eth.pct50&&eth.advice==="VERKOOP"?0.5:1.0;
      const ethSell=pf.eth*factor;
      const ethPriceEurSell=eth.priceEur||eth.price/(eth.eurUsd||1.09);
      const eurReceived=ethSell*ethPriceEurSell;
      const fee=eurReceived*0.0025;
      const next={...pf,eur:pf.eur+(eurReceived-fee),eth:pf.eth-ethSell,
        trades:[...pf.trades,{type:"sell",price:ethPriceEurSell,priceUsd:eth.price,eth:ethSell,eur:eurReceived-fee,fee,pct:factor*100,time:Date.now()}]};
      state.portfolio=next;savePf(next);renderContent();updateBanner();
    });
    btnRow.appendChild(buyBtn);btnRow.appendChild(sellBtn);
    pfBox.appendChild(btnRow);

    pfBox.appendChild(div({fontSize:"0.58rem",color:"#444",fontFamily:"'Space Mono',monospace",marginTop:"6px"},["Bitvavo fee 0.25% wordt automatisch verrekend"]));
  }

  // Laatste trades
  pf.trades.slice(-3).reverse().forEach((t,i)=>{
    const tPriceStr=t.priceUsd?`€${t.price.toFixed(0)} ($${Math.round(t.priceUsd).toLocaleString("nl-NL")})`:`€${t.price.toFixed(0)}`;
    pfBox.appendChild(div({fontSize:"0.65rem",color:"#555",fontFamily:"'Space Mono',monospace",padding:"5px 0",borderTop:"1px solid rgba(255,255,255,0.04)",marginTop:i===0?"10px":"0"},

    ));
  });

  const resetRow=div({textAlign:"right",padding:"4px 2px 8px"});

  resetBtn.addEventListener("click",()=>{
    if(!confirm("Portefeuille resetten? Dit verwijdert alle lokale trades en het saldo. Je Bitvavo account wordt niet aangepast."))return;
    localStorage.removeItem("eth_pf");
    localStorage.removeItem("eth_hi");
    state.portfolio=loadPf();
    state.history=loadHi();
    renderContent();updateBanner();
  });
  resetRow.appendChild(resetBtn);
  wrap.appendChild(resetRow);

  // ── Signaalgeschiedenis ─────────────────────────────────────────────────
  const hiBox=div({background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:"12px",padding:"16px"});
  const hiHeader=div({display:"flex",justifyContent:"space-between",marginBottom:"12px"},[
    div({fontSize:"0.6rem",color:"#555",letterSpacing:"0.15em",fontFamily:"'Space Mono',monospace"},["SIGNAALGESCHIEDENIS"])
  ]);
  if(acc!==null)hiHeader.appendChild(div({fontSize:"0.7rem",fontWeight:"700",color:acc>=60?"#00C896":"#F0A500",fontFamily:"'Space Mono',monospace"},[`🎯 ${acc}% (${ev.length} signalen)`]));
  hiBox.appendChild(hiHeader);
  if(!state.history.length){
    hiBox.appendChild(div({fontSize:"0.7rem",color:"#444",fontFamily:"'Space Mono',monospace",fontStyle:"italic"},["Nog geen signalen. Kom later terug."]));
  } else {
    state.history.slice(-8).reverse().forEach(s=>{
      const c=s.advice==="KOOP"?"#00C896":s.advice==="VERKOOP"?"#FF4D6D":"#F0A500";
      const r=s.result===true?"✓":s.result===false?"✗":"…";
      hiBox.appendChild(div({display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:"0.65rem",fontFamily:"'Space Mono',monospace"},[
        el("span",{style:{color:c,fontWeight:"700",minWidth:"90px"}},[s.advice+(s.strength?" · "+s.strength:"")]),
        el("span",{style:{color:"#555"}},["$"+(s.price||0).toLocaleString("nl-NL",{maximumFractionDigits:0})]),
        el("span",{style:{color:"#444"}},[new Date(s.time).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"})]),
        el("span",{style:{color:s.result===true?"#00C896":s.result===false?"#FF4D6D":"#444"}},[r])
      ]));
    });
  }
  wrap.appendChild(hiBox);
  frag.appendChild(wrap);
  return frag;
}

// ─── Classic data fetchers ────────────────────────────────────────────────────
async function fetchFast(){
  state.fastRefreshing=true;
  // Goud via metals.live — gratis, geen key, geen limiet, CORS open
  let goldOk=false;
  try{
    const res=await fetch("https://metals.live/api/latest",{signal:AbortSignal.timeout(5000)});
    const d=await res.json();
    if(d?.gold){
      const price=d.gold;
      const prev=d.gold_prev||price;
      const c=((price-prev)/prev)*100;
      applyLive("gold",{value:`$${Math.round(price).toLocaleString("nl-NL")}`,change:c,ytd:fp(c)});
      goldOk=true;
    }
  }catch(_){}
  // Fallback goud via Yahoo Finance GC=F
  if(!goldOk){
    try{
      const res=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/GC=F?interval=1d&range=2d",{signal:AbortSignal.timeout(6000)});
      const d=await res.json();
      const meta=d?.chart?.result?.[0]?.meta;
      if(meta?.regularMarketPrice){
        const price=meta.regularMarketPrice;
        const prev=meta.previousClose??meta.chartPreviousClose;
        const c=prev?((price-prev)/prev)*100:0;
        applyLive("gold",{value:`$${Math.round(price).toLocaleString("nl-NL")}`,change:c,ytd:fp(c)});
      }
    }catch(_){}
  }
  // Brent olie via Yahoo Finance
  try{
    const res=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=2d",{signal:AbortSignal.timeout(6000)});
    const d=await res.json();
    const meta=d?.chart?.result?.[0]?.meta;
    if(meta){const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;applyLive("oil",{value:`$${price.toFixed(1)}`,change:c,ytd:fp(c)});}
  }catch(_){}
  state.fastRefreshing=false;
  if(state.tab!=="crypto")renderContent();
}

  for(const[id,sym]of Object.entries({sp500:"^GSPC",vix:"^VIX",yield:"^TNX"})){
    try{
      const res=await fetch(`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`,{signal:AbortSignal.timeout(7000)});
      const d=await res.json();
      const meta=d?.chart?.result?.[0]?.meta;if(!meta)continue;
      const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;
      if(id==="sp500")applyLive("sp500",{value:price.toLocaleString("nl-NL",{maximumFractionDigits:0}),change:c,ytd:fp(c)});
      if(id==="vix")  applyLive("vix",  {value:price.toFixed(1),change:c,ytd:fp(c)});
      if(id==="yield")applyLive("yield",{value:`${price.toFixed(2)}%`,change:c,ytd:fp(c,2)});
    }catch(_){}
  }
  // DXY via Yahoo query2
  try{
    const res=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/DX-Y.NYB?interval=1d&range=2d",{signal:AbortSignal.timeout(5000)});
    const d=await res.json();
    const meta=d?.chart?.result?.[0]?.meta;
    if(meta){const price=meta.regularMarketPrice;const prev=meta.previousClose??meta.chartPreviousClose;const c=prev?((price-prev)/prev)*100:0;applyLive("dollar",{value:price.toFixed(1),change:c,ytd:fp(c)});}
  }catch(_){}
  if(state.tab!=="crypto")renderContent();
}
function applyLive(id,data){
  state.classicItems=state.classicItems.map(item=>{
    if(item.id!==id)return item;
    return{...item,...data,signal:deriveSignal(id,parseFloat(data.value),data.change)};
  });
  state.lastLiveUpdate=new Date();
  updateDataStatusBar();
}

// ─── ETH WebSocket ────────────────────────────────────────────────────────────
let ws,reconnTimer;
async function fetchEurUsd(){
  try{
    const r=await fetch("https://api.frankfurter.app/latest?from=EUR&to=USD",{signal:AbortSignal.timeout(5000)});
    const d=await r.json();
    if(d?.rates?.USD){state.eurUsd=d.rates.USD;console.log("EUR/USD:",state.eurUsd);}
  }catch(_){
    // Fallback via Yahoo Finance
    try{
      const r=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/EURUSD=X?interval=1d&range=2d",{signal:AbortSignal.timeout(5000)});
      const d=await r.json();
      const p=d?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if(p)state.eurUsd=p;
    }catch(_){}
  }
}

async function fetchBTCPrice(){
  // Meerdere bronnen proberen — allemaal CORS open
  const sources=[
    async()=>{const r=await fetch("https://min-api.cryptocompare.com/data/pricemultifull?fsyms=ETH&tsyms=USD",{signal:AbortSignal.timeout(6000)});const d=await r.json();const e=d.RAW?.ETH?.USD;return{price:e?.PRICE,ch24:e?.CHANGEPCT24HOUR};},
    async()=>{const r=await fetch("https://api.kraken.com/0/public/Ticker?pair=XETHZUSD",{signal:AbortSignal.timeout(6000)});const d=await r.json();const t=d.result?.XETHZUSD;return{price:parseFloat(t?.c?.[0]),ch24:((parseFloat(t?.c?.[0])-parseFloat(t?.o))/parseFloat(t?.o))*100};},
    async()=>{const r=await fetch("https://min-api.cryptocompare.com/data/price?fsym=ETH&tsyms=USD",{signal:AbortSignal.timeout(6000)});const d=await r.json();return{price:d.USD,ch24:0};},
    async()=>{const r=await fetch("https://query2.finance.yahoo.com/v8/finance/chart/ETH-USD?interval=1m&range=1d",{signal:AbortSignal.timeout(6000)});const d=await r.json();const m=d?.chart?.result?.[0]?.meta;return{price:m?.regularMarketPrice,ch24:((m?.regularMarketPrice-m?.previousClose)/m?.previousClose)*100};},
  ];
  for(const src of sources){
    try{
      const{price,ch24}=await src();
      if(!price||isNaN(price))continue;
      const closes=state.closesArr.length>0?state.closesArr:[price];
      const sig=buildSignals(price,ch24||0,closes,state.portfolio);
      const priceEur=price/state.eurUsd;
      state.eth={price,priceEur,eurUsd:state.eurUsd,change24:ch24||0,...sig,timestamp:new Date()};
      state.ethLoading=false;
      updateHistory(price,sig);
      sendETHNotif(price,sig);
      if(state.tab==="crypto")renderContent();else updateBanner();
      return;
    }catch(_){}
  }
  state.eth={errorMsg:"Geen ETH data beschikbaar"};
  state.ethLoading=false;
  if(state.tab==="crypto")renderContent();
}

function updateHistory(price,sig){
  const last=state.history[state.history.length-1];
  if(!last||last.advice!==sig.advice){
    const updated=state.history.map(s=>{
      if(s.result!==null||!s.price)return s;
      const ageH=(Date.now()-new Date(s.time))/3600000;
      if(ageH>=4){const ok=(s.advice==="KOOP"&&price>s.price)||(s.advice==="VERKOOP"&&price<s.price);return{...s,result:s.advice==="HOUD"?null:ok};}
      return s;
    });
    state.history=[...updated,{advice:sig.advice,strength:sig.strength,price,time:new Date().toISOString(),result:null}];
    saveHi(state.history);
  }
}

function sendETHNotif(price,sig){
  if(!sig||sig.advice==="HOUD"||sig.overrideReason)return;
  const isStrong=sig.strength==="STERK";
  const isNew=state.lastAdv!==`${sig.advice}-${sig.strength}`;
  const today=new Date().toDateString();
  if(!state.notifTodayDate||state.notifTodayDate!==today){state.notifToday=0;state.notifTodayDate=today;}
  if(isStrong&&isNew&&state.notifToday<2&&typeof Notification!=="undefined"&&Notification.permission==="granted"){
    const h=new Date().getHours();
    if(h<21&&h>=7){
      const perc=sig.pct50?"50%":"100%";
      const fibMsg=sig.fib&&sig.advice==="KOOP"&&price>=sig.fib.fib650&&price<=sig.fib.fib618?" 📐 Golden Pocket!":"";
      try{new Notification(`🚨 ETH ${sig.advice} ${perc} — URGENT`,{body:`$${Math.round(price).toLocaleString("nl-NL")} · RSI ${sig.rsi?.toFixed(0)} · ${sig.buy}v${sig.sell}${fibMsg}`});}catch(_){}
      state.notifToday++;
      state.lastAdv=`${sig.advice}-${sig.strength}`;
    }
  }
}

function connectWS(){
  try{
    ws=new WebSocket("wss://stream.binance.com:9443/stream?streams=ethusdt@ticker/ethusdt@kline_4h");
    ws.onopen=()=>{state.ethLoading=false;if(state.tab==="crypto")renderContent();};
    ws.onmessage=(ev)=>{
      try{
        const msg=JSON.parse(ev.data);
        if(msg.stream==="ethusdt@ticker"){
          const price=parseFloat(msg.data.c);
          const ch24=parseFloat(msg.data.P);
          const closes=state.closesArr.length>0?state.closesArr:[price];
          const sig=buildSignals(price,ch24,closes,state.portfolio);
          const priceEur=price/state.eurUsd;
          state.eth={price,priceEur,eurUsd:state.eurUsd,change24:ch24,...sig,timestamp:new Date()};
          state.ethLoading=false;
          updateHistory(price,sig);
          sendETHNotif(price,sig);
          if(state.tab==="crypto")renderContent();else updateBanner();
        }
        if(msg.stream==="ethusdt@kline_4h"&&msg.data.k?.x){
          state.closesArr=[...state.closesArr.slice(-60),parseFloat(msg.data.k.c)];
        }
      }catch(_){}
    };
    ws.onerror=()=>{state.eth={errorMsg:"WebSocket fout — herverbinden..."};if(state.tab==="crypto")renderContent();};
    ws.onclose=()=>{reconnTimer=setTimeout(connectWS,3000);};
  }catch(e){state.eth={errorMsg:e.message};state.ethLoading=false;if(state.tab==="crypto")renderContent();}
}

// ─── Init ─────────────────────────────────────────────────────────────────────
renderAll();
// Probeer eerst WebSocket, als die faalt gebruik REST API polling
connectWS();
// Altijd ook REST polling als backup (elke 30s)
fetchEurUsd();
fetchBTCPrice();
setInterval(fetchBTCPrice,30000);
setInterval(fetchEurUsd,30*60*1000);
// Auto-sync Bitvavo bij laden als keys aanwezig
const _bvKeys=loadBitvavoKeys();
if(_bvKeys.key&&_bvKeys.secret){syncBitvavo();setInterval(syncBitvavo,5*60*1000);}
fetchFast();fetchSlow();fetchAltLive();
setInterval(fetchFast,5*60*1000);   // goud + olie: elke 5 min
setInterval(fetchSlow,15*60*1000);  // S&P, VIX, rente, dollar: elke 15 min
setInterval(fetchAltLive,5*60*1000);
</script>
